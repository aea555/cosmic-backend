name: Manual Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        default: "dev"

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Derive image tags
        id: image
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          safe_ref="$(echo "${{ inputs.ref }}" | tr '/:@' '-' | tr -cd '[:alnum:]._-')"
          short_sha="$(git rev-parse --short=12 HEAD)"
          image="ghcr.io/${owner}/cosmic-backend:${safe_ref}-${short_sha}"
          latest="ghcr.io/${owner}/cosmic-backend:${safe_ref}-latest"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ steps.image.outputs.latest }}
          cache-from: type=gha,scope=cosmic-backend
          cache-to: type=gha,mode=max,scope=cosmic-backend

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    env:
      TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
    steps:
      - name: Connect to Tailscale (optional)
        if: ${{ env.TS_AUTHKEY != '' }}
        continue-on-error: true
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ env.TS_AUTHKEY }}

      - name: Select SSH host (Tailscale first)
        id: ssh_host
        env:
          TS_SSH_HOST: ${{ secrets.TS_SSH_HOST }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: "2558"
        run: |
          set -euo pipefail
          can_reach() {
            local host="$1"
            [ -n "$host" ] || return 1
            timeout 5 bash -c "cat < /dev/null > /dev/tcp/${host}/${SSH_PORT}" >/dev/null 2>&1
          }

          if can_reach "${TS_SSH_HOST}"; then
            SELECTED_HOST="${TS_SSH_HOST}"
            SELECTED_PATH="tailscale"
          elif can_reach "${SSH_HOST}"; then
            SELECTED_HOST="${SSH_HOST}"
            SELECTED_PATH="direct"
          else
            echo "Neither TS_SSH_HOST nor SSH_HOST is reachable on port ${SSH_PORT}."
            exit 1
          fi

          echo "host=${SELECTED_HOST}" >> "$GITHUB_OUTPUT"
          echo "path=${SELECTED_PATH}" >> "$GITHUB_OUTPUT"
          echo "Using ${SELECTED_PATH} SSH path: ${SELECTED_HOST}:${SSH_PORT}"

      - name: Execute remote deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_IMAGE: ${{ needs.build_and_push.outputs.image }}
          DEPLOY_REF: ${{ inputs.ref }}
        with:
          host: ${{ steps.ssh_host.outputs.host }}
          port: 2558
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: BACKEND_IMAGE,DEPLOY_REF
          command_timeout: 45m
          script: |
            set -euo pipefail
            cd ~/cosmic-backend/

            DOCKER_BIN="$(command -v docker || true)"
            [ -n "${DOCKER_BIN}" ] || { echo "docker command not found on target host"; exit 1; }
            if ! "${DOCKER_BIN}" info >/dev/null 2>&1; then
              if sudo -n "${DOCKER_BIN}" info >/dev/null 2>&1; then
                docker() { sudo -n "${DOCKER_BIN}" "$@"; }
              else
                echo "No permission to access docker daemon (try adding user to docker group)."
                id || true
                groups || true
                ls -l /var/run/docker.sock || true
                exit 1
              fi
            fi

            git fetch origin --tags --prune
            if git show-ref --verify --quiet "refs/remotes/origin/${DEPLOY_REF}"; then
              git checkout -B "${DEPLOY_REF}" "origin/${DEPLOY_REF}"
              git reset --hard "origin/${DEPLOY_REF}"
            else
              git checkout -f "${DEPLOY_REF}"
              git reset --hard "${DEPLOY_REF}"
            fi

            touch .env.production
            if grep -qE '^BACKEND_IMAGE=' .env.production; then
              sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${BACKEND_IMAGE}|" .env.production
            else
              printf '\nBACKEND_IMAGE=%s\n' "${BACKEND_IMAGE}" >> .env.production
            fi

            docker compose -f docker/docker-compose.yml --env-file .env.production pull api
            docker compose -f docker/docker-compose.yml --env-file .env.production up -d --no-build --remove-orphans
            docker image prune -f

      - name: Disconnect Tailscale
        if: ${{ always() && env.TS_AUTHKEY != '' }}
        run: |
          set +e
          if command -v tailscale >/dev/null 2>&1; then
            sudo tailscale down || true
            sudo tailscale logout || true
          fi
