name: Deploy to VPS

on:
    push:
        branches:
            - dev

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
        steps:
            - name: Connect to Tailscale (optional)
              if: ${{ env.TS_AUTHKEY != '' }}
              continue-on-error: true
              uses: tailscale/github-action@v3
              with:
                  authkey: ${{ env.TS_AUTHKEY }}

            - name: Select SSH host (Tailscale first)
              id: ssh_host
              env:
                  TS_SSH_HOST: ${{ secrets.TS_SSH_HOST }}
                  SSH_HOST: ${{ secrets.SSH_HOST }}
                  SSH_PORT: "2558"
              run: |
                  set -euo pipefail
                  can_reach() {
                    local host="$1"
                    [ -n "$host" ] || return 1
                    timeout 5 bash -c "cat < /dev/null > /dev/tcp/${host}/${SSH_PORT}" >/dev/null 2>&1
                  }

                  if can_reach "${TS_SSH_HOST}"; then
                    SELECTED_HOST="${TS_SSH_HOST}"
                    SELECTED_PATH="tailscale"
                  elif can_reach "${SSH_HOST}"; then
                    SELECTED_HOST="${SSH_HOST}"
                    SELECTED_PATH="direct"
                  else
                    echo "Neither TS_SSH_HOST nor SSH_HOST is reachable on port ${SSH_PORT}."
                    exit 1
                  fi

                  echo "host=${SELECTED_HOST}" >> "$GITHUB_OUTPUT"
                  echo "path=${SELECTED_PATH}" >> "$GITHUB_OUTPUT"
                  echo "Using ${SELECTED_PATH} SSH path: ${SELECTED_HOST}:${SSH_PORT}"

            - name: Execute Remote SSH Commands
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ steps.ssh_host.outputs.host }}
                  port: 2558
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  script: |
                      # hata oluşursa durdur
                      set -e 
                      cd ~/cosmic-backend/
                      docker compose -f docker/docker-compose.yml --env-file .env.production down
                      git fetch origin
                      git checkout -f dev || git checkout -b dev origin/dev
                      git reset --hard origin/dev
                      docker compose -f docker/docker-compose.yml --env-file .env.production up -d --build
                      docker image prune -f

            - name: Disconnect Tailscale
              if: ${{ always() && env.TS_AUTHKEY != '' }}
              run: |
                  set +e
                  if command -v tailscale >/dev/null 2>&1; then
                    sudo tailscale down || true
                    sudo tailscale logout || true
                  fi
