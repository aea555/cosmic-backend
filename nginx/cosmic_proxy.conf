# Proxy configuration for Cosmic API
# Include this in location blocks that proxy to the API
#
# This file handles:
# - Proper client IP forwarding (works with Cloudflare Tunnel)
# - WebSocket support (if needed)
# - Timeout configuration
# - Buffer settings

# Pass client IP to backend
# Priority: CF-Connecting-IP (Cloudflare) > X-Real-IP > $remote_addr
# This ensures we get the real client IP whether using Cloudflare or not

# Set X-Real-IP based on source
# If behind Cloudflare, use CF-Connecting-IP
set $real_ip $remote_addr;
if ($http_cf_connecting_ip) {
    set $real_ip $http_cf_connecting_ip;
}

proxy_set_header X-Real-IP $real_ip;
proxy_set_header X-Forwarded-For $real_ip;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

# Standard proxy headers
proxy_set_header Host $host;
proxy_set_header Connection "";
proxy_http_version 1.1;

# Timeouts
proxy_connect_timeout 10s;
proxy_send_timeout 60s;
proxy_read_timeout 60s;

# Buffer settings for JSON responses
proxy_buffer_size 16k;
proxy_buffers 4 32k;
proxy_busy_buffers_size 64k;

# Don't buffer responses (stream immediately)
proxy_buffering off;

# Pass through error pages from backend
proxy_intercept_errors off;
