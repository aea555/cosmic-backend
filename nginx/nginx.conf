# Nginx Configuration for Cosmic Password Manager API
# 
# This configuration works with:
# - Local development (nginx as reverse proxy)
# - Cloudflare Tunnel (adds CF-Connecting-IP header)
# - Production behind any reverse proxy
#
# IMPORTANT: Cloudflare Tunnel should connect to nginx, not directly to the API.
# This ensures consistent header handling and additional security layers.

# Upstream definition for the Rust API
upstream cosmic_api {
    # Docker container name (use 'api' for docker-compose networking)
    # For non-docker local dev, change to 127.0.0.1:9000
    server api:8080;
    
    # Connection pooling
    keepalive 32;
}

# Rate limiting zones (optional, in addition to API-level rate limiting)
# These provide a first line of defense before requests hit the API
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 9090;
    listen [::]:9090;
    server_name api.example.com localhost;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression (API already compresses, but this helps if not)
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # Block external access to health check
    location /api/v1/health {
        deny all;
        return 403;
    }

    # API Documentation (Scalar)
    location /docs {
        proxy_pass http://cosmic_api;
        include /etc/nginx/cosmic_proxy.conf;
    }

    # Auth endpoints - stricter rate limiting
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://cosmic_api;
        include /etc/nginx/cosmic_proxy.conf;
    }

    # All other API endpoints
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://cosmic_api;
        include /etc/nginx/cosmic_proxy.conf;
    }

    # Default - reject non-API requests
    location / {
        return 404;
    }
}
