# Docker Compose for Cosmic Password Manager API
#
# Usage:
#   Development:  docker compose --env-file ../.env up -d
#   Production:   docker compose --env-file ../.env.production up -d
#
# Environment files should be in the project root (../), not in this docker/ folder.
# Copy ../.env.example to ../.env and configure your values.

services:
  postgres:
    image: postgres:16-alpine
    container_name: cosmic-postgres
    env_file: ../.env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  valkey:
    image: valkey/valkey:9.0-alpine
    container_name: cosmic-valkey
    env_file: ../.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@valkey:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "${REDIS_PORT:?REDIS_PORT is required}:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cosmic-api
    env_file: ../.env
    # Internal only - nginx handles external traffic
    expose:
      - "${SERVER_PORT}"
    environment:
      SERVER_HOST: ${SERVER_HOST:?SERVER_HOST is required}
      SERVER_PORT: ${SERVER_PORT}
      APP_URL: ${APP_URL:?APP_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS:-900}
      REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS:-30}
      EMAIL__MAILTRAP_API_TOKEN: ${EMAIL__MAILTRAP_API_TOKEN:?EMAIL__MAILTRAP_API_TOKEN is required}
      EMAIL__FROM_EMAIL: ${EMAIL__FROM_EMAIL:?EMAIL__FROM_EMAIL is required}
      EMAIL__FROM_NAME: ${EMAIL__FROM_NAME:?EMAIL__FROM_NAME is required}
      EMAIL__REPLY_TO_EMAIL: ${EMAIL__REPLY_TO_EMAIL:?EMAIL__REPLY_TO_EMAIL is required}

      # Logging
      RUST_LOG: ${RUST_LOG:-info,cosmic_backend=debug}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: cosmic-nginx
    ports:
      - "${NGINX_PORT:-9090}:9090"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro,Z
      - ../nginx/cosmic_proxy.conf:/etc/nginx/cosmic_proxy.conf:ro,Z
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  valkey_data:
